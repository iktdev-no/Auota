spring:
  output:
    ansi:
      enabled: always
  webflux:
    request:
      timeout: 0
  web:
    resources:
      add-mappings: true

logging:
  level:
    root: INFO
    no.iktdev: DEBUG
    org.springframework: INFO
  file:
    name: /var/log/auota/spring.log


server:
  port: ${APP_DEPLOYMENT_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
